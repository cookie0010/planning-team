<!-- 표지 템플릿. 플레이스홀더: {{TITLE}} {{PROJECT}} {{DATE}} {{VERSION}}
     레이아웃·문구·로고는 자유롭게 수정 — 스타일은 style.css 의 .cover 블록 참조 -->
<div class="cover">
  <div class="cover-brand">Softn · Planning Team</div>
  <div class="cover-main">
    <div class="cover-kicker">Product Requirements Document</div>
    <h1 class="cover-title">{{TITLE}}</h1>
    <div class="cover-rule"></div>
    <table class="cover-meta">
      <tr><td>Project</td><td>{{PROJECT}}</td></tr>
      <tr><td>Version</td><td>{{VERSION}}</td></tr>
      <tr><td>Date</td><td>{{DATE}}</td></tr>
    </table>
  </div>
  <div class="cover-footer">본 문서는 내부 공유용입니다.</div>
</div>
