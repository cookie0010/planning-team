<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A · 캔버스 목록 — 빈 상태 — board-v2 와이어프레임</title>
  <link rel="stylesheet" href="wf.css" />
  <link rel="stylesheet" href="wf-screen.css?v=2" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body { font-family: var(--wf-font-family); background: var(--wf-bg-base); color: var(--wf-text-default); -webkit-font-smoothing: antialiased; }

    .empty { max-width: 480px; margin: 96px auto 0; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .empty-art { width: 92px; height: 92px; border-radius: 24px; border: 1.5px dashed var(--wf-border-strong); display: flex; align-items: center; justify-content: center; font-size: 38px; color: var(--wf-text-sub);
      background: repeating-linear-gradient(45deg, var(--wf-a-grey-100), var(--wf-a-grey-100) 10px, var(--wf-a-grey-50) 10px, var(--wf-a-grey-50) 20px); margin-bottom: 6px; }
    .empty h2 { color: var(--wf-text-strong); margin: 0; }
    .empty p { color: var(--wf-text-sub); margin: 0 0 8px; font-size: var(--wf-st10-size); }

    .frame-note { max-width: 1320px; margin: 0 auto; padding: var(--wf-space-64) var(--wf-space-40) var(--wf-space-40); }
    .frame-note .tag { font-size: var(--wf-st13-size); color: var(--wf-text-sub); border: 1px dashed var(--wf-border-strong); border-radius: 8px; padding: 10px 14px; }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="brand"><span class="mark"></span> canvas</div>
    <span class="spacer"></span>
    <input class="wf-field search" placeholder="캔버스 검색" />
    <button class="icon-btn" id="themeBtn" title="테마 전환">◐</button>
    <span class="wf-avatar is-sm">교사</span>
  </header>

  <main class="main">
    <div class="page-head">
      <div>
        <h1 class="wf-t2 wf-bold">기분좋은 하루, canvas와 함께해요</h1>
      </div>
      <div class="head-actions">
        <a class="wf-btn" data-new-canvas>+ 캔버스 생성</a>
      </div>
    </div>

    <div class="empty">
      <div class="empty-art">+</div>
      <h2 class="wf-st5 wf-bold">아직 만든 캔버스가 없어요</h2>
      <p>첫 캔버스를 만들어 학생들에게 QR로 공유해 보세요.</p>
      <a class="wf-btn is-large" data-new-canvas>+ 캔버스 생성</a>
    </div>
  </main>

  <div class="frame-note">
    <div class="tag">박스 레벨 · IA <b>A</b> (빈 상태 · 첫 진입) · 중앙 정렬 단일 CTA → T 템플릿 선택 · 데스크톱 1440</div>
  </div>

  <script src="wf-screen.js?v=2"></script>
</body>
</html>
